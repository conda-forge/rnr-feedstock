context:
  version: "0.5.1"

package:
  name: rnr
  version: ${{ version }}

source:
  url: https://github.com/ismaelgv/rnr/archive/v${{ version }}.tar.gz
  sha256: af35b5d5afab08b01cab345686d7e7d2d37a33d268fa8827a8001c3164ef4722

build:
  number: 0

requirements:
  build:
    - ${{ compiler('rust') }}
    - ${{ compiler('c') }}
    - ${{ stdlib('c') }}
    - cargo-bundle-licenses

tests:
  - script:
      - rnr --help

about:
  license: MIT
  license_file:
    - LICENSE
    - THIRDPARTY.yml
  summary: Command-line tool to batch rename files and directories
  homepage: https://github.com/chmln/rnr
  repository: https://github.com/chmln/rnr

extra:
  recipe-maintainers:
    - danielnachun
